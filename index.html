<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix - 0G Agent Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-mono min-h-screen flex flex-col justify-between">
    <!-- Header -->
    <header class="border-b border-cyan-500/30 p-4 bg-gray-900/50 backdrop-blur">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">PHOENIX</h1>
            <span class="text-xs px-3 py-1 bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 rounded-full">Powered by 0G Verifiable Stack</span>
        </div>
    </header>

    <!-- Main Workspace Matrix -->
    <main class="max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch my-auto">
        <!-- Left Panel: Forge -->
        <div class="bg-gray-900/40 border border-gray-800 rounded-xl p-5 flex flex-col justify-between backdrop-blur">
            <div>
                <h2 class="text-lg font-bold text-cyan-400 mb-2">⚡ THE AGENT FORGE</h2>
                <p class="text-xs text-gray-400 mb-4">Program an autonomous combat agent using natural language.</p>
                <textarea id="promptInput" placeholder="Describe your fighter's build, strategy, and personality rules..." class="w-full h-40 bg-gray-950/80 border border-gray-800 rounded-lg p-3 text-sm focus:outline-none focus:border-cyan-500/50 transition resize-none"></textarea>
            </div>
            <button onclick="simulateForge()" class="w-full mt-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-gray-950 font-bold text-sm py-3 rounded-lg shadow-lg shadow-cyan-500/10 transition uppercase tracking-wider">Forge Autonomous Agent</button>
        </div>

        <!-- Right Panel: Terminal Log -->
        <div class="bg-gray-900/40 border border-gray-800 rounded-xl p-5 flex flex-col justify-between backdrop-blur">
            <div>
                <h2 class="text-lg font-bold text-purple-400 mb-2">⚔️ THE ARENA FLOOR</h2>
                <p class="text-xs text-gray-400 mb-4">Verifiable combat execution logs via 0G Compute Nodes.</p>
                <div id="terminal" class="w-full h-40 bg-gray-950/90 border border-gray-800 rounded-lg p-3 text-xs overflow-y-auto font-mono text-emerald-400/90 space-y-1">
                    <p class="text-gray-500">> System initialized. Awaiting agent signature...</p>
                </div>
            </div>
            <button onclick="startBattle()" class="w-full mt-4 bg-gradient-to-r from-purple-500 to-pink-600 hover:from-purple-400 hover:to-pink-500 text-gray-950 font-bold text-sm py-3 rounded-lg shadow-lg shadow-purple-500/10 transition uppercase tracking-wider">Simulate Verifiable Battle</button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 p-4 text-center text-xs text-gray-600">
        The Zero Cup 2026 Submission Protocol
    </footer>

    <!-- Interactive Simulator Logic -->
    <script>
        function simulateForge() {
            const input = document.getElementById('promptInput').value;
            const term = document.getElementById('terminal');
            if(!input) return alert('Describe your agent first!');
            term.innerHTML = `<p class="text-cyan-400">> Commencing 0G Storage transaction sequence...</p>
                              <p class="text-gray-400">> Uploading agent payload to decentralized hash allocation...</p>
                              <p class="text-emerald-400">> Success! Agent properties registered immutably.</p>`;
        }
        function startBattle() {
            const term = document.getElementById('terminal');
            term.innerHTML = `<p class="text-purple-400">> Initiating TeeTLS-attested proxy broker channel...</p>
                              <p class="text-purple-400">> Routing prompt matrix to verified 0G Compute node...</p>
                              <p class="text-yellow-500">> [ROUND 1] Forged Agent uses Glitch Magic! Countering Overlord defensive protocols.</p>
                              <p class="text-cyan-400">> [ROUND 2] Overlord attempts baseline memory corruption. Attestation confirmed safe.</p>
                              <p class="text-emerald-400 font-bold">> [RESULT] VICTORY ACHIEVED. Battle logs verified on-chain.</p>`;
        }
    </script>
</body>
</html>
